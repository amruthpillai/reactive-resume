name: reactive_resume

services:
  reactive_resume:
    build:
      context: .
      dockerfile: Dockerfile.dev
    init: true
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: "3000"
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      AUTH_SECRET: change-me-to-a-secure-secret-key-in-production
      ENCRYPTION_SECRET: change-me-to-a-secure-secret-key-in-production
      S3_ACCESS_KEY_ID: seaweedfs
      S3_SECRET_ACCESS_KEY: seaweedfs
      S3_ENDPOINT: http://seaweedfs:8333
      S3_BUCKET: reactive-resume
      S3_FORCE_PATH_STYLE: "true"
      REDIS_URL: redis://redis:6379
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/app/data
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .git/
            - .pnpm-store/
            - .turbo/
            - .vite-hooks/
            - data/
            - node_modules/
            - apps/*/node_modules/
            - packages/*/node_modules/
            - apps/*/.output/
            - apps/*/.tanstack/
            - apps/*/.turbo/
            - packages/*/.turbo/
            - coverage/
            - apps/*/coverage/
            - packages/*/coverage/
            - reports/
            - apps/*/reports/
            - packages/*/reports/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      seaweedfs_create_bucket:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1));"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 30s
      timeout: 10s
      retries: 3

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: server -s3 -filer -dir=/data -ip=0.0.0.0
    environment:
      AWS_ACCESS_KEY_ID: seaweedfs
      AWS_SECRET_ACCESS_KEY: seaweedfs
    volumes:
      - seaweedfs_data:/data
    expose:
      - "8333"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

  seaweedfs_create_bucket:
    image: quay.io/minio/mc:latest
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        until mc alias set seaweedfs http://seaweedfs:8333 seaweedfs seaweedfs; do
          echo 'Waiting for SeaweedFS...';
          sleep 2;
        done;
        mc mb seaweedfs/reactive-resume --ignore-existing;
      "
    depends_on:
      seaweedfs:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
