name: autofix.ci

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Run lint:fix to autofix lint errors
      - run: pnpm run lint:fix

      # Run fmt:fix to autofix formatting issues
      - run: pnpm run fmt:fix

      - uses: autofix-ci/action@1.3.2
